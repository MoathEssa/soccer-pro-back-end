# ─────────────────────────────────────────────────────────────────────────────
# SoccerPro – Build & Deploy to Azure Container Apps (Free Tier)
#
# Triggers on push to main.
# 1. Builds Docker image and pushes to GitHub Container Registry (free)
# 2. Deploys infrastructure via Bicep (Container Apps Environment)
# 3. Deploys the container app with the new image
# ─────────────────────────────────────────────────────────────────────────────

name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# ── Global environment ────────────────────────────────────────────────────────
env:
  AZURE_RG: rg-soccerpro
  APP_NAME: soccerpro
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ╭──────────────────────────────────────────╮
  # │  1. Build & Push Docker Image            │
  # ╰──────────────────────────────────────────╯
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ╭──────────────────────────────────────────╮
  # │  2. Deploy Infrastructure + App (Bicep)  │
  # ╰──────────────────────────────────────────╯
  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RG }}
          template: infra/main.bicep
          parameters: >-
            appName="${{ env.APP_NAME }}"
            containerImage="${{ env.IMAGE_NAME }}:latest"
            connectionStringDefault="${{ secrets.CONNECTION_STRING_DEFAULT }}"
            jwtSecretKey="${{ secrets.JWT_SECRET_KEY }}"
            frontendBaseUrl="${{ secrets.FRONTEND_BASE_URL }}"
          failOnStdErr: false

      - name: Azure logout
        if: always()
        run: az logout
